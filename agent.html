<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PD Agent — Essense</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--forest:#044524;--essense:#579B7A;--bright:#EAF5F2;--egg:#FAF0DB;--yellow:#FFC502;--charcoal:#1c1c1c;--muted:#6b7280;--border:#c8dfd6;--white:#fff;--font-head:'DM Serif Display',serif;--font-body:'DM Sans',sans-serif}
body{font-family:var(--font-body);color:var(--charcoal);background:var(--white);max-width:680px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
.agent-header{background:var(--forest);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-shrink:0}
.agent-avatar{width:40px;height:40px;border-radius:50%;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.agent-info{flex:1}
.agent-name{font-family:var(--font-head);font-size:1.05rem;color:var(--white);margin-bottom:.1rem}
.agent-status{font-size:.72rem;color:#b7e4c7;display:flex;align-items:center;gap:.35rem}
.status-dot{width:7px;height:7px;border-radius:50%;background:#52b788}
.mode-tabs{display:flex;gap:0;flex-shrink:0}
.m-tab{background:rgba(255,255,255,.1);color:#b7e4c7;border:none;padding:.4rem .85rem;font-family:var(--font-body);font-size:.75rem;cursor:pointer;transition:all .2s;font-weight:500}
.m-tab:first-child{border-radius:8px 0 0 8px}
.m-tab:last-child{border-radius:0 8px 8px 0}
.m-tab.active{background:var(--yellow);color:var(--forest)}
.context-bar{background:var(--egg);border-bottom:1px solid var(--border);padding:.65rem 1.25rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;flex-shrink:0}
.ctx-label{font-size:.7rem;color:var(--muted);font-weight:500}
.ctx-pill{background:var(--white);border:1px solid var(--border);border-radius:99px;padding:.15rem .55rem;font-size:.7rem;color:var(--forest);font-weight:500}
.chat-area{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:.75rem}
.msg{max-width:84%;line-height:1.6;font-size:.875rem;border-radius:12px;padding:.75rem 1rem}
.msg.bot{background:var(--bright);color:var(--forest);align-self:flex-start;border-bottom-left-radius:2px}
.msg.user{background:var(--forest);color:var(--white);align-self:flex-end;border-bottom-right-radius:2px}
.msg.system{background:var(--egg);border:1px solid var(--border);color:var(--muted);font-size:.78rem;font-style:italic;align-self:center;text-align:center;border-radius:8px;padding:.45rem .85rem;max-width:92%}
.msg-bot-name{font-size:.68rem;color:var(--essense);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.25rem}
.typing{display:flex;gap:.3rem;align-items:center;padding:.65rem .875rem;background:var(--bright);border-radius:12px 12px 12px 2px;width:fit-content}
.t-dot{width:7px;height:7px;border-radius:50%;background:var(--essense);animation:blink 1.2s infinite}
.t-dot:nth-child(2){animation-delay:.2s}.t-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
.quick-actions{display:flex;gap:.4rem;flex-wrap:wrap;padding:.65rem 1.25rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--egg);flex-shrink:0;overflow-x:auto}
.qa-btn{background:var(--white);border:1px solid var(--border);border-radius:99px;padding:.3rem .8rem;font-family:var(--font-body);font-size:.72rem;cursor:pointer;color:var(--charcoal);white-space:nowrap;transition:all .2s;flex-shrink:0}
.qa-btn:hover{border-color:var(--essense);background:var(--bright);color:var(--forest)}
.input-area{padding:.875rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:.5rem;flex-shrink:0;background:var(--white)}
.chat-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:.6rem .875rem;font-family:var(--font-body);font-size:.875rem;color:var(--charcoal);background:var(--white);outline:none;resize:none;transition:border .2s;line-height:1.4}
.chat-input:focus{border-color:var(--essense)}
.send-btn{background:var(--forest);color:var(--white);border:none;border-radius:10px;padding:.6rem 1rem;font-family:var(--font-body);font-size:.875rem;font-weight:500;cursor:pointer;flex-shrink:0;transition:background .2s}
.send-btn:hover{background:var(--essense)}
.prototype-note{background:#fff3cd;border-top:1px solid #ffc502;padding:.45rem 1.25rem;font-size:.7rem;color:#6b5000;text-align:center;flex-shrink:0}
</style>
</head>
<body>
<div class="agent-header">
  <div class="agent-avatar">✦</div>
  <div class="agent-info">
    <div class="agent-name">Your PD Agent</div>
    <div class="agent-status"><span class="status-dot"></span>connected to your Hub · Notion · Calendar</div>
  </div>
  <div class="mode-tabs">
    <button class="m-tab active" onclick="setMode('chat',this)">chat</button>
    <button class="m-tab" onclick="setMode('reflect',this)">reflect</button>
    <button class="m-tab" onclick="setMode('plan',this)">plan</button>
  </div>
</div>

<div class="context-bar">
  <span class="ctx-label">your context:</span>
  <span class="ctx-pill">L1 → L2</span>
  <span class="ctx-pill">Journey & Blueprinting goal</span>
  <span class="ctx-pill">3 actions ready</span>
  <span class="ctx-pill">coach: 3 Jun</span>
</div>

<div class="chat-area" id="chat-area"></div>

<div class="quick-actions" id="quick-actions">
  <button class="qa-btn" onclick="quickSend('What should I focus on this week?')">what should I focus on this week?</button>
  <button class="qa-btn" onclick="quickSend('How am I doing on my goal?')">how am I doing on my goal?</button>
  <button class="qa-btn" onclick="quickSend('I want to reflect on something')">I want to reflect</button>
  <button class="qa-btn" onclick="quickSend('What training fits my goal?')">training suggestions</button>
  <button class="qa-btn" onclick="quickSend('Help me prepare for my coach session')">prep for coaching</button>
</div>

<div class="input-area">
  <textarea class="chat-input" id="chat-input" rows="1" placeholder="ask anything about your PD…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}" oninput="autoGrow(this)"></textarea>
  <button class="send-btn" onclick="send()">→</button>
</div>

<div class="prototype-note">🤖 prototype mode — in the final version this connects live to Claude with your Notion and Calendar data</div>

<script>
const SS={get(k){try{return localStorage.getItem(k)}catch(e){return null}},set(k,v){try{localStorage.setItem(k,v)}catch(e){}}};
let mode='chat';
let history=[];

const responses={
  chat:{
    default:[
      "Based on your active goal — Journey & Blueprinting L1→L2 — you have 3 micro-actions ready to start. The most relevant one for this week is reading the NN/g service blueprints article. It's only 15 minutes.",
      "You haven't logged a reflection since you set up your goal. Even a quick check-in (2 min) would update your dashboard and give your coach something to work with in your session on 3 June.",
      "Your time budget is at 62% this week — you still have around 38 minutes. That's enough for one action and a quick reflection.",
    ],
    focus:["Your strongest focus area right now is back-stage process mapping — it's your active goal and it shows up in your feedback too. A good week would be: 1 reading session, 1 practice attempt on your current project.",
      "Given your 3 June coaching session is close, I'd prioritise getting one reflection logged and selecting your discussion topics in the coach prep tool. Your coach will have more to work with."],
    goal:["Your Journey & Blueprinting goal is at 0% — you have the sub-goals set but no actions completed yet. The first sub-goal is foundational: build understanding of the blueprint structure. That's the reading task.",
      "Your goal is well-structured — 5 sub-goals across Q2 and Q3. The gap is execution. What's making it hard to start the first action?"],
    reflect:["Let's do a quick reflection. What's been on your mind lately with your development?",
      "Good timing for a reflection — your coaching session is in 9 days. What went well this week, even something small?"],
    training:["For your Journey & Blueprinting goal, I'd suggest starting with the NN/g Service Blueprints article (15 min, free). After that, the Nielsen Norman journey mapping course is worth the budget — 5 colleagues have endorsed it.",
      "You haven't logged any training yet this period. Even one article counts. Want me to open the training menu filtered to your goal?"],
    coaching:["Your coach session is Tuesday 3 June at 14:00 — 9 days away. Rosie has already set 1 goal but has 0 reflections logged and 0 actions done. A good opener for the session would be: 'what's making it hard to start?'\n\nWant me to open your coach prep doc?"]
  },
  reflect:{
    start:["Let's start. What's been on your mind lately — in your project work, your development, or anything that stood out?"],
    followup:["That's useful context. What felt most challenging about that for you?",
      "And looking back — what did you actually learn from it, even if it was hard?",
      "If you could change or try one thing differently going forward, what would that be?",
      "Last one — how are you feeling right now, reflecting on all of this?"]
  },
  plan:{
    start:["Let's plan your PD for the coming week. You have 38 minutes left in your budget. What feels most important to work on?"],
    followup:["Given your goal and your coaching session on 3 June, I'd suggest:\n\n1. NN/g service blueprint read (15 min) — closes the knowledge gap\n2. Quick reflection (5 min) — gives your coach something to work with\n3. Open the coach prep and select your discussion topics (10 min)\n\nWant me to add these as micro-actions to your tracker?",
      "Confirmed — added to your tracker. Your PD plan for this week is set. Come back when you've done one and I'll log the time automatically."]
  }
};

let reflectIdx=0;let planIdx=0;

function getResponse(text){
  const t=text.toLowerCase();
  if(mode==='reflect'){
    if(reflectIdx===0){reflectIdx++;return responses.reflect.start[0];}
    const r=responses.reflect.followup[Math.min(reflectIdx-1,responses.reflect.followup.length-1)];
    reflectIdx++;return r;
  }
  if(mode==='plan'){
    if(planIdx===0){planIdx++;return responses.plan.start[0];}
    const r=responses.plan.followup[Math.min(planIdx-1,responses.plan.followup.length-1)];
    planIdx++;return r;
  }
  // chat mode keyword matching
  if(t.includes('focus')||t.includes('week')){return responses.chat.focus[Math.floor(Math.random()*responses.chat.focus.length)];}
  if(t.includes('goal')||t.includes('doing')){return responses.chat.goal[Math.floor(Math.random()*responses.chat.goal.length)];}
  if(t.includes('reflect')){return responses.chat.reflect[Math.floor(Math.random()*responses.chat.reflect.length)];}
  if(t.includes('train')||t.includes('suggest')){return responses.chat.training[Math.floor(Math.random()*responses.chat.training.length)];}
  if(t.includes('coach')||t.includes('prep')||t.includes('session')){return responses.chat.coaching[0];}
  return responses.chat.default[Math.floor(Math.random()*responses.chat.default.length)];
}

function addMsg(role,text,name){
  const area=document.getElementById('chat-area');
  if(role==='typing'){
    const el=document.createElement('div');el.id='typing-indicator';
    el.innerHTML='<div class="typing"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>';
    area.appendChild(el);area.scrollTop=area.scrollHeight;return;
  }
  document.getElementById('typing-indicator')?.remove();
  const wrap=document.createElement('div');
  if(role==='bot'&&name){const n=document.createElement('div');n.className='msg-bot-name';n.textContent=name;wrap.appendChild(n);}
  const m=document.createElement('div');m.className='msg '+role;m.style.whiteSpace='pre-wrap';m.textContent=text;
  wrap.appendChild(m);area.appendChild(wrap);area.scrollTop=area.scrollHeight;
}

function send(){
  const inp=document.getElementById('chat-input');
  const val=inp.value.trim();if(!val)return;
  addMsg('user',val);inp.value='';inp.style.height='auto';
  history.push({role:'user',text:val});
  addMsg('typing');
  setTimeout(()=>{
    const r=getResponse(val);
    addMsg('bot',r,'PD Agent');
    history.push({role:'bot',text:r});
  },900+Math.random()*400);
}

function quickSend(text){document.getElementById('chat-input').value=text;send();}

function setMode(m,btn){
  mode=m;reflectIdx=0;planIdx=0;
  document.querySelectorAll('.m-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  const modeOpeners={
    chat:'switched to chat mode — ask me anything about your PD, goals, or what to do next.',
    reflect:'switched to reflection mode — I\'ll guide you through a short reflection, one question at a time.',
    plan:'switched to planning mode — let\'s map out your PD for the coming week.'
  };
  addMsg('system',modeOpeners[m]);
}

function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// Opening message
window.addEventListener('load',()=>{
  setTimeout(()=>{
    addMsg('bot','Hi Rosie 👋 I\'m your PD agent — I can see your goals, reflections, budget, and upcoming coaching session. What would you like to work on today?','PD Agent');
  },400);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PD Time Budget — Essense</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--forest:#044524;--essense:#579B7A;--bright:#EAF5F2;--egg:#FAF0DB;--yellow:#FFC502;--charcoal:#1c1c1c;--muted:#6b7280;--border:#c8dfd6;--white:#fff;--font-head:'DM Serif Display',serif;--font-body:'DM Sans',sans-serif}
body{font-family:var(--font-body);color:var(--charcoal);background:var(--white);padding:2rem 1.5rem 3rem;max-width:700px;margin:0 auto}
.label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--essense);margin-bottom:.6rem;font-weight:500}
.heading{font-family:var(--font-head);font-size:1.5rem;color:var(--forest);margin-bottom:.4rem}
.sub{font-size:.875rem;color:var(--muted);margin-bottom:1.75rem;line-height:1.6}
.divider{height:1px;background:var(--border);margin:1.75rem 0}
.view-tabs{display:flex;gap:.4rem;margin-bottom:1.5rem}
.vtab{background:var(--egg);border:1.5px solid var(--border);border-radius:8px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;color:var(--muted);transition:all .2s;font-weight:500;font-family:var(--font-body)}
.vtab:hover{border-color:var(--essense);color:var(--charcoal)}
.vtab.active{background:var(--forest);border-color:var(--forest);color:var(--white)}
.hero{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.75rem;flex-wrap:wrap}
.hero-num{font-family:var(--font-head);font-size:4rem;color:var(--forest);line-height:1}
.hero-right{flex:1}
.hero-label{font-size:.875rem;color:var(--charcoal);margin-bottom:.5rem}
.hero-bar{height:14px;background:var(--bright);border-radius:99px;overflow:hidden;margin-bottom:.4rem}
.hero-fill{height:100%;border-radius:99px;background:var(--forest);transition:width .6s ease}
.hero-sub{font-size:.75rem;color:var(--muted)}
.source-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.75rem}
.sc{background:var(--egg);border:1px solid var(--border);border-radius:12px;padding:1rem}
.sc-icon{font-size:1.1rem;margin-bottom:.4rem}
.sc-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:500;margin-bottom:.3rem}
.sc-val{font-size:1.5rem;font-weight:300;color:var(--forest);font-family:var(--font-head);line-height:1}
.sc-unit{font-size:.7rem;color:var(--muted);margin-top:.15rem}
.sc-bar{height:5px;background:var(--bright);border-radius:99px;overflow:hidden;margin-top:.6rem}
.sc-fill{height:100%;border-radius:99px}
.log-section{margin-bottom:1.5rem}
.log-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.log-title{font-size:.875rem;font-weight:500;color:var(--charcoal)}
.add-entry-btn{background:var(--forest);color:var(--white);border:none;border-radius:7px;padding:.35rem .8rem;font-family:var(--font-body);font-size:.75rem;font-weight:500;cursor:pointer}
.log-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .875rem;background:var(--egg);border:1px solid var(--border);border-radius:9px;margin-bottom:.4rem}
.log-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.log-text{flex:1;font-size:.8rem;color:var(--charcoal)}
.log-time{font-size:.8rem;font-weight:500;color:var(--forest)}
.log-type{font-size:.7rem;color:var(--muted);background:var(--white);border:1px solid var(--border);border-radius:99px;padding:.1rem .5rem}
.empty-log{font-size:.8rem;color:var(--muted);font-style:italic;padding:.75rem 0}
.add-form{background:var(--bright);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-top:.75rem;display:none}
.add-form.open{display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr auto;gap:.6rem;margin-bottom:.6rem;align-items:end}
.form-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin-bottom:.25rem}
.form-input{border:1px solid var(--border);border-radius:7px;padding:.5rem .65rem;font-family:var(--font-body);font-size:.8rem;color:var(--charcoal);background:var(--white);outline:none;width:100%;transition:border .2s}
.form-input:focus{border-color:var(--essense)}
.form-select{border:1px solid var(--border);border-radius:7px;padding:.5rem .65rem;font-family:var(--font-body);font-size:.8rem;color:var(--charcoal);background:var(--white);outline:none;width:100%}
.form-num{width:72px}
.btn-add-entry{background:var(--forest);color:var(--white);border:none;border-radius:7px;padding:.5rem 1rem;font-family:var(--font-body);font-size:.8rem;font-weight:500;cursor:pointer;white-space:nowrap}
.insight{background:var(--bright);border-left:3px solid var(--yellow);border-radius:0 8px 8px 0;padding:.875rem 1.1rem;font-size:.875rem;color:var(--forest);font-style:italic;margin-top:1.25rem;line-height:1.6}
.arrow{font-family:var(--font-head);color:var(--yellow);margin-right:.3rem}
.weekly-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem;margin-bottom:1.5rem}
.day-col{text-align:center}
.day-label{font-size:.7rem;color:var(--muted);font-weight:500;margin-bottom:.35rem}
.day-bar-wrap{height:80px;background:var(--bright);border-radius:6px;overflow:hidden;position:relative;display:flex;align-items:flex-end}
.day-bar{width:100%;border-radius:6px;background:var(--essense);transition:height .4s ease}
.day-val{font-size:.7rem;color:var(--muted);margin-top:.3rem}
.back-link{display:inline-block;font-size:.8rem;color:var(--essense);text-decoration:none;margin-bottom:1.5rem}
.back-link:hover{color:var(--forest)}
</style>
</head>
<body>
<a class="back-link" href="./dashboard.html">← back to dashboard</a>
<p class="label">pd time budget</p>
<h1 class="heading">where your 4% goes</h1>
<p class="sub">every coach session, calendar block, and completed micro-action counts toward your weekly 96-minute budget.</p>

<div class="view-tabs">
  <button class="vtab active" onclick="setView('week',this)">this week</button>
  <button class="vtab" onclick="setView('quarter',this)">this quarter</button>
  <button class="vtab" onclick="setView('year',this)">this year</button>
</div>

<div id="view-content"></div>

<div class="divider"></div>

<div class="log-section">
  <div class="log-head">
    <div class="log-title">time log</div>
    <button class="add-entry-btn" onclick="toggleForm()">+ log time</button>
  </div>
  <div id="log-list"></div>
  <div class="add-form" id="add-form">
    <div class="form-row">
      <div>
        <div class="form-label">what</div>
        <input class="form-input" id="f-what" placeholder="e.g. Coach session"/>
      </div>
      <div>
        <div class="form-label">type</div>
        <select class="form-select" id="f-type">
          <option>Coach session</option>
          <option>Calendar block</option>
          <option>Micro-action</option>
          <option>Training</option>
          <option>Reflection</option>
        </select>
      </div>
      <div>
        <div class="form-label">min</div>
        <input class="form-input form-num" id="f-min" type="number" min="5" max="120" value="30"/>
      </div>
    </div>
    <button class="btn-add-entry" onclick="addEntry()">add to log</button>
  </div>
</div>

<div class="insight" id="main-insight"></div>

<script>
let entries=[
  {what:'Coach session',type:'Coach session',min:30,date:'Mon'},
  {what:'Calendar block — blueprinting reading',type:'Calendar block',min:15,date:'Tue'},
  {what:'Read NN/g article',type:'Micro-action',min:13,date:'Tue'},
];
const budget=96;
const typeColors={'Coach session':'#044524','Calendar block':'#579B7A','Micro-action':'#FFC502','Training':'#b7994a','Reflection':'#c8dfd6'};
let currentView='week';

function totalMin(){return entries.reduce((s,e)=>s+e.min,0);}
function pct(){return Math.min(100,Math.round(totalMin()/budget*100));}

function setView(v,btn){
  currentView=v;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderView();
}

function renderView(){
  const el=document.getElementById('view-content');
  const used=totalMin();const left=Math.max(0,budget-used);const p=pct();
  if(currentView==='week'){
    el.innerHTML=`
      <div class="hero">
        <div class="hero-num">${p}%</div>
        <div class="hero-right">
          <div class="hero-label"><strong>${used} min</strong> used of <strong>${budget} min</strong> weekly budget</div>
          <div class="hero-bar"><div class="hero-fill" style="width:${p}%"></div></div>
          <div class="hero-sub">${left} min remaining this week</div>
        </div>
      </div>
      <div class="source-grid">
        <div class="sc"><div class="sc-icon">🤝</div><div class="sc-label">coach</div><div class="sc-val">${entries.filter(e=>e.type==='Coach session').reduce((s,e)=>s+e.min,0)}</div><div class="sc-unit">min this week</div><div class="sc-bar"><div class="sc-fill" style="width:${Math.min(100,entries.filter(e=>e.type==='Coach session').reduce((s,e)=>s+e.min,0)/budget*100)}%;background:#044524"></div></div></div>
        <div class="sc"><div class="sc-icon">📅</div><div class="sc-label">blocks</div><div class="sc-val">${entries.filter(e=>e.type==='Calendar block').reduce((s,e)=>s+e.min,0)}</div><div class="sc-unit">min scheduled</div><div class="sc-bar"><div class="sc-fill" style="width:${Math.min(100,entries.filter(e=>e.type==='Calendar block').reduce((s,e)=>s+e.min,0)/budget*100)}%;background:#579B7A"></div></div></div>
        <div class="sc"><div class="sc-icon">🧱</div><div class="sc-label">actions</div><div class="sc-val">${entries.filter(e=>e.type==='Micro-action'||e.type==='Training'||e.type==='Reflection').reduce((s,e)=>s+e.min,0)}</div><div class="sc-unit">min done</div><div class="sc-bar"><div class="sc-fill" style="width:${Math.min(100,entries.filter(e=>e.type==='Micro-action'||e.type==='Training'||e.type==='Reflection').reduce((s,e)=>s+e.min,0)/budget*100)}%;background:#FFC502"></div></div></div>
      </div>
      <div class="label" style="margin-bottom:.75rem">week overview — Mon to Fri</div>
      <div class="weekly-grid" id="week-bars"></div>
    `;
    const days=['Mon','Tue','Wed','Thu','Fri'];
    const dayEl=document.getElementById('week-bars');
    days.forEach(d=>{
      const dayMin=entries.filter(e=>e.date===d).reduce((s,e)=>s+e.min,0);
      const h=Math.max(4,Math.round(dayMin/budget*100*0.8));
      const col=document.createElement('div');col.className='day-col';
      col.innerHTML=`<div class="day-label">${d}</div><div class="day-bar-wrap"><div class="day-bar" style="height:${h}%;background:${dayMin>0?'var(--essense)':'var(--bright)'}"></div></div><div class="day-val">${dayMin>0?dayMin+'m':'—'}</div>`;
      dayEl.appendChild(col);
    });
  } else if(currentView==='quarter'){
    const qBudget=budget*13;const qUsed=used*4;
    el.innerHTML=`<div class="hero"><div class="hero-num">${Math.round(qUsed/qBudget*100)}%</div><div class="hero-right"><div class="hero-label"><strong>${qUsed} min</strong> used of <strong>${qBudget} min</strong> quarterly budget</div><div class="hero-bar"><div class="hero-fill" style="width:${Math.min(100,Math.round(qUsed/qBudget*100))}%"></div></div><div class="hero-sub">${Math.max(0,qBudget-qUsed)} min remaining this quarter</div></div></div><p style="font-size:.8rem;color:var(--muted);font-style:italic">quarterly view uses estimated data. sync from Notion for live data.</p>`;
  } else {
    const yBudget=budget*52;const yUsed=used*17;
    el.innerHTML=`<div class="hero"><div class="hero-num">${Math.round(yUsed/yBudget*100)}%</div><div class="hero-right"><div class="hero-label"><strong>${Math.round(yUsed/60*10)/10} hrs</strong> used of <strong>${Math.round(yBudget/60)} hrs</strong> yearly budget</div><div class="hero-bar"><div class="hero-fill" style="width:${Math.min(100,Math.round(yUsed/yBudget*100))}%"></div></div><div class="hero-sub">${Math.round(Math.max(0,yBudget-yUsed)/60*10)/10} hrs remaining this year</div></div></div><p style="font-size:.8rem;color:var(--muted);font-style:italic">yearly view uses estimated data. sync from Notion for live data.</p>`;
  }
  renderLog();
  renderInsight();
}

function renderLog(){
  const list=document.getElementById('log-list');
  if(entries.length===0){list.innerHTML='<div class="empty-log">no time logged yet — use the + button above</div>';return;}
  list.innerHTML=entries.map((e,i)=>`<div class="log-item"><div class="log-dot" style="background:${typeColors[e.type]||'#c8dfd6'}"></div><div class="log-text">${e.what}</div><span class="log-type">${e.type}</span><div class="log-time">${e.min} min</div></div>`).join('');
}

function renderInsight(){
  const used=totalMin();const left=Math.max(0,budget-used);const p=pct();
  const el=document.getElementById('main-insight');
  if(p>=100){el.innerHTML='<span class="arrow">→</span>you\'ve used your full weekly budget. great week — the system will suggest new blocks from Monday.';}
  else if(p>=50){el.innerHTML='<span class="arrow">→</span>'+left+' min left this week. enough for '+(Math.floor(left/15))+' more micro-actions, or one focused reading session.';}
  else{el.innerHTML='<span class="arrow">→</span>you have '+left+' min left in your budget this week. your next scheduled micro-action is 15 min — want to do it now?';}
}

function toggleForm(){document.getElementById('add-form').classList.toggle('open');}

function addEntry(){
  const what=document.getElementById('f-what').value.trim();
  const type=document.getElementById('f-type').value;
  const min=parseInt(document.getElementById('f-min').value)||15;
  if(!what)return;
  entries.push({what,type,min,date:'Today'});
  document.getElementById('f-what').value='';
  document.getElementById('f-min').value='15';
  document.getElementById('add-form').classList.remove('open');
  renderView();
}

renderView();
</script>
</body>
</html>

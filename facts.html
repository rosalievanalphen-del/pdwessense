<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Did you know</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif}
body{
  background:#044524;
  display:flex;align-items:center;
  padding:1.1rem 1.5rem;
  min-height:80px;
}
.wrap{display:flex;align-items:flex-start;gap:.875rem;width:100%}
.icon{font-size:1rem;flex-shrink:0;margin-top:.15rem;line-height:1}
.inner{flex:1;min-width:0}
.label{
  font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;
  color:#b7e4c7;font-weight:500;margin-bottom:.3rem
}
.fact{
  font-family:'DM Serif Display',serif;
  font-size:.95rem;color:#EAF5F2;
  line-height:1.55;font-style:italic
}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">💡</div>
  <div class="inner">
    <div class="label">did you know</div>
    <div class="fact" id="fact"></div>
  </div>
</div>
<script>
var FACTS = [
  'Professionals who reflect regularly \u2014 even just 5 minutes \u2014 grow significantly faster than colleagues who don\'t. Not because they work harder, but because they learn more deliberately from what they already do.',
  'The best predictor of long-term performance isn\'t talent \u2014 it\'s the consistency of deliberate practice and the quality of feedback received on it. Actively seeking feedback is one of the strongest career-growth behaviours at any level.',
  'People who write down their goals are 42% more likely to achieve them. Writing converts a vague intention into a commitment \u2014 your brain treats it differently.',
  'Learning embedded in daily work \u2014 small moments of reflection in the flow of what you\'re already doing \u2014 is five times more likely to lead to behaviour change than standalone training.',
  'Positive feedback activates the same reward circuits in the brain as a monetary gain. Giving it costs nothing; receiving it builds the psychological safety that makes growth possible.',
  'The best performers seek feedback 20% more often than average performers. Most people wait to be asked; the ones who grow go looking for it.',
  'Autonomy, mastery and purpose are the three core drivers of intrinsic motivation at work. Extrinsic rewards can actually crowd them out.',
  'Small, consistent development investments compound faster than occasional big efforts. Ten minutes a day beats one full day a month.',
  'Micro-learning in 10\u201315 minute sessions outperforms marathon study for practical skill development \u2014 especially when applied to real work immediately after.',
  'Talking through a problem \u2014 even out loud to yourself \u2014 measurably improves the quality of your thinking. Reflection is not just recording; it\'s processing.',
  'The brain consolidates learning during sleep. A brief reflection before bed really does help things stick.',
  'People who feel psychologically safe at work are 3.5\u00d7 more likely to experiment, speak up and innovate \u2014 which is why feedback culture matters so much.',
  'Growth mindset people see effort as the path to mastery. Fixed mindset people see it as a sign they don\'t have the ability. The difference in outcomes is significant.',
  'Asking for help is one of the most under-rated skills in professional development. It signals self-awareness, not weakness.'
];

// Rotate daily — changes every morning automatically
var now   = new Date();
var start = new Date(now.getFullYear(), 0, 0);
var day   = Math.floor((now - start) / 864e5);
document.getElementById('fact').textContent = FACTS[day % FACTS.length];
</script>
</body>
</html>

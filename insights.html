<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Insights — Essense PD</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="./store.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--forest:#044524;--essense:#579B7A;--bright:#EAF5F2;--egg:#FAF0DB;--yellow:#FFC502;--charcoal:#1c1c1c;--muted:#6b7280;--border:#c8dfd6;--white:#fff;--font-head:'DM Serif Display',serif;--font-body:'DM Sans',sans-serif}
body{font-family:var(--font-body);color:var(--charcoal);background:var(--white);padding:2rem 1.5rem 4rem;max-width:680px;margin:0 auto}
.view{display:none}.view.active{display:block;animation:fadeup .25s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--essense);font-weight:500;margin-bottom:.5rem}
.heading{font-family:var(--font-head);font-size:1.5rem;color:var(--forest);margin-bottom:.4rem;line-height:1.2}
.sub{font-size:.875rem;color:var(--muted);line-height:1.6;margin-bottom:1.75rem}
.section-title{font-size:.825rem;font-weight:500;color:var(--charcoal);text-transform:uppercase;letter-spacing:.09em;margin:1.75rem 0 .75rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.btn-p{background:var(--forest);color:var(--white);border:none;border-radius:9px;padding:.65rem 1.3rem;font-family:var(--font-body);font-size:.875rem;font-weight:500;cursor:pointer;transition:background .2s}
.btn-p:hover{background:var(--essense)}
.btn-y{background:var(--yellow);color:var(--forest);border:none;border-radius:9px;padding:.65rem 1.3rem;font-family:var(--font-body);font-size:.875rem;font-weight:600;cursor:pointer}
.btn-s{background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:9px;padding:.65rem 1.1rem;font-family:var(--font-body);font-size:.875rem;cursor:pointer;transition:all .2s}
.btn-s:hover{border-color:var(--essense);color:var(--charcoal)}
.btn-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1.25rem;align-items:center}
.btn-ghost{background:transparent;color:var(--essense);border:none;font-family:var(--font-body);font-size:.8rem;cursor:pointer;padding:0;font-weight:500}
.btn-ghost:hover{color:var(--forest)}

/* ── Insight cards ── */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.5rem}
.insight-card{border-radius:13px;padding:1.1rem 1.25rem;cursor:pointer;transition:all .25s;border:1.5px solid transparent}
.insight-card.good{background:#F0FAF4;border-color:#a8d5b5}
.insight-card.good:hover{border-color:var(--essense);box-shadow:0 2px 10px rgba(87,155,122,.15)}
.insight-card.improve{background:#FFF8E6;border-color:#f5d88a}
.insight-card.improve:hover{border-color:#d4a800;box-shadow:0 2px 10px rgba(212,168,0,.12)}
.insight-card.empty-card{border:2px dashed var(--border);background:var(--egg);cursor:default;display:flex;align-items:center;justify-content:center;min-height:100px}
.ic-tag{font-size:.65rem;text-transform:uppercase;letter-spacing:.09em;font-weight:600;margin-bottom:.4rem;display:flex;align-items:center;gap:.35rem}
.ic-tag.good-tag{color:var(--essense)}
.ic-tag.improve-tag{color:#b7994a}
.ic-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ic-dot.good{background:var(--essense)}
.ic-dot.improve{background:#d4a800}
.ic-text{font-size:.875rem;color:var(--charcoal);line-height:1.45;font-style:italic}
.ic-src{font-size:.7rem;color:var(--muted);margin-top:.5rem}
.ic-empty-msg{font-size:.78rem;color:var(--muted);text-align:center;font-style:italic;padding:.5rem}

/* Insight → goal action row */
.insight-action-row{background:var(--bright);border:1px solid var(--border);border-radius:12px;padding:.875rem 1.1rem;display:flex;align-items:center;gap:.875rem;flex-wrap:wrap;margin-bottom:1rem}
.ia-text{flex:1;font-size:.825rem;color:var(--forest);line-height:1.4}
.ia-text strong{font-weight:600}
.ia-btn{background:var(--yellow);color:var(--forest);border:none;border-radius:7px;padding:.4rem .875rem;font-family:var(--font-body);font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap}
.ia-btn:hover{opacity:.9}
/* Insight → goal panel */
.ig-panel{background:var(--white);border:1.5px solid var(--essense);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;display:none;animation:fadeup .2s ease}
.ig-panel.open{display:block}
.ig-panel-title{font-size:.78rem;font-weight:500;color:var(--forest);margin-bottom:.65rem;text-transform:uppercase;letter-spacing:.07em}
.ig-textarea{width:100%;border:1px solid var(--border);border-radius:9px;padding:.55rem .75rem;font-family:var(--font-body);font-size:.85rem;color:var(--charcoal);background:var(--egg);resize:vertical;min-height:56px;line-height:1.5;outline:none;transition:border .2s;margin-bottom:.65rem}
.ig-textarea:focus{border-color:var(--essense);background:var(--white)}
.ig-type-row{display:flex;gap:.5rem;margin-bottom:.65rem;flex-wrap:wrap}
.ig-type-btn{padding:.3rem .75rem;border-radius:99px;font-size:.75rem;border:1.5px solid var(--border);color:var(--muted);background:transparent;cursor:pointer;font-family:var(--font-body);transition:all .2s}
.ig-type-btn.active{background:var(--forest);color:var(--white);border-color:var(--forest)}
.ig-sel{width:100%;border:1px solid var(--border);border-radius:9px;padding:.5rem .75rem;font-family:var(--font-body);font-size:.85rem;color:var(--charcoal);background:var(--egg);outline:none;margin-bottom:.65rem;transition:border .2s}
.ig-sel:focus{border-color:var(--essense)}
.ig-sel.hidden{display:none}

/* Reflection + feedback rows */
.entry-item{border:1px solid var(--border);border-radius:11px;padding:.875rem 1rem;margin-bottom:.5rem;cursor:pointer;transition:all .2s;background:var(--egg)}
.entry-item:hover{border-color:var(--essense);background:var(--bright)}
.ei-row{display:flex;align-items:center;gap:.65rem;flex-wrap:nowrap}
.ei-icon{font-size:1rem;flex-shrink:0}
.ei-body{flex:1;min-width:0}
.ei-top{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.2rem}
.ei-title{font-size:.875rem;font-weight:500;color:var(--charcoal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ei-date{font-size:.72rem;color:var(--muted);white-space:nowrap}
.ei-preview{font-size:.8rem;color:var(--muted);line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ei-tag{font-size:.65rem;border-radius:99px;padding:.1rem .5rem;font-weight:500;flex-shrink:0}
.ei-tag.positive{background:var(--bright);color:var(--essense);border:1px solid var(--essense)}
.ei-tag.improve{background:#FFF8E6;color:#b7994a;border:1px solid #f5d88a}
.ei-tag.neutral{background:var(--egg);color:var(--muted);border:1px solid var(--border)}
.ei-tag.written,.ei-tag.walk,.ei-tag.audio,.ei-tag.quick,.ei-tag.talk{background:var(--bright);color:var(--forest);border:1px solid var(--border)}
.ei-arr{font-size:1rem;color:var(--border);flex-shrink:0}
.ei-energy{font-size:.72rem;color:var(--muted);margin-left:auto}

/* Entry detail view */
.det-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem}
.det-icon{font-size:1.5rem}
.det-tag{font-size:.72rem;background:var(--bright);color:var(--forest);border-radius:99px;padding:.2rem .65rem;font-weight:500}
.det-date{font-size:.78rem;color:var(--muted)}
.det-body{background:var(--egg);border:1px solid var(--border);border-radius:13px;padding:1.1rem 1.25rem;margin-bottom:1rem}
.det-q{font-size:.72rem;color:var(--essense);text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin-bottom:.25rem;margin-top:.75rem}
.det-q:first-of-type{margin-top:0}
.det-a{font-size:.875rem;color:var(--charcoal);line-height:1.55}
.det-meta{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;font-size:.78rem;color:var(--muted);margin-top:.25rem}
.det-energy{display:inline-flex;align-items:center;gap:.25rem}

/* Log feedback form */
.fb-form{background:var(--egg);border:1.5px solid var(--border);border-radius:13px;padding:1.1rem 1.25rem;margin-top:.875rem;display:none}
.fb-form.open{display:block;animation:fadeup .2s ease}
.fb-field{margin-bottom:.875rem}
.fb-label{font-size:.72rem;font-weight:500;color:var(--charcoal);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem;display:block}
.fb-input{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:.6rem .875rem;font-family:var(--font-body);font-size:.875rem;color:var(--charcoal);background:var(--white);outline:none;transition:border .2s}
.fb-input:focus{border-color:var(--essense)}
textarea.fb-input{resize:vertical;min-height:72px;line-height:1.6}
.fb-type-row{display:flex;gap:.5rem}
.fb-type-btn{flex:1;padding:.5rem;border:1.5px solid var(--border);border-radius:9px;background:var(--white);cursor:pointer;font-size:.78rem;text-align:center;transition:all .2s;color:var(--muted);font-family:var(--font-body)}
.fb-type-btn.sel-positive{border-color:var(--essense);background:var(--bright);color:var(--essense);font-weight:500}
.fb-type-btn.sel-improve{border-color:#d4a800;background:#FFF8E6;color:#b7994a;font-weight:500}
.fb-type-btn.sel-neutral{border-color:var(--charcoal);background:var(--egg);color:var(--charcoal);font-weight:500}
.fb-saved{font-size:.78rem;color:var(--essense);margin-left:.5rem;opacity:0;transition:opacity .3s}

@media(max-width:500px){.insight-grid{grid-template-columns:1fr}}


</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     MAIN VIEW
════════════════════════════════════════════════ -->
<div class="view active" id="v-main">
  <p class="label">insights</p>
  <h1 class="heading">what your reflections are telling you</h1>
  <p class="sub">patterns from your reflections and feedback, pulled together automatically.</p>

  <!-- Insight cards -->
  <div class="insight-grid" id="insight-cards"></div>
  <div id="insight-action-row"></div>

  <!-- Insight → goal/sub-goal panel -->
  <div class="ig-panel" id="ig-panel">
    <div class="ig-panel-title">turn this insight into action</div>
    <textarea class="ig-textarea" id="ig-text" placeholder="refine the text if needed…"></textarea>
    <div class="ig-type-row">
      <button class="ig-type-btn active" onclick="igPickMode('subgoal',this)">add as sub-goal</button>
      <button class="ig-type-btn" onclick="igPickMode('newgoal',this)">add as new goal</button>
    </div>
    <select class="ig-sel" id="ig-goal-sel"></select>
    <div class="btn-row" style="margin-top:.5rem">
      <button class="btn-y" onclick="igConfirm()">approve &amp; add</button>
      <button class="btn-s" onclick="igCancel()">cancel</button>
    </div>
  </div>

  <!-- Reflections received -->
  <div class="section-title">your reflections</div>
  <div id="refl-list"></div>

  <!-- Feedback received -->
  <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
    <span>feedback received</span>
    <button class="btn-ghost" onclick="toggleFbForm()">+ log feedback</button>
  </div>
  <div id="fb-list"></div>

  <!-- Log feedback form -->
  <div class="fb-form" id="fb-form">
    <div class="fb-field">
      <label class="fb-label">from</label>
      <input class="fb-input" id="fb-from" placeholder="who gave you this feedback?"/>
    </div>
    <div class="fb-field">
      <label class="fb-label">type</label>
      <div class="fb-type-row">
        <button class="fb-type-btn sel-positive" id="fbt-positive" onclick="pickFbType('positive')">👍 positive</button>
        <button class="fb-type-btn" id="fbt-improve" onclick="pickFbType('improve')">↑ improve</button>
        <button class="fb-type-btn" id="fbt-neutral" onclick="pickFbType('neutral')">⚖️ neutral</button>
      </div>
    </div>
    <div class="fb-field">
      <label class="fb-label">what did they say?</label>
      <textarea class="fb-input" id="fb-text" rows="3" placeholder="capture it in their words, or your paraphrase…"></textarea>
    </div>
    <div class="fb-field">
      <label class="fb-label">context (optional)</label>
      <input class="fb-input" id="fb-context" placeholder="project, meeting, situation…"/>
    </div>
    <div class="btn-row" style="margin-top:.5rem">
      <button class="btn-y" onclick="saveFeedback()">save feedback</button>
      <button class="btn-s" onclick="toggleFbForm()">cancel</button>
      <span class="fb-saved" id="fb-saved">saved ✓</span>
    </div>
  </div>

</div><!-- /v-main -->

<!-- ═══════════════════════════════════════════════
     DETAIL VIEW — reflection
════════════════════════════════════════════════ -->
<div class="view" id="v-refl-det">
  <div class="det-header">
    <div class="det-icon" id="det-refl-icon"></div>
    <div>
      <div id="det-refl-tag"></div>
      <div class="det-date" id="det-refl-date"></div>
    </div>
    <button class="btn-s" style="margin-left:auto;padding:.4rem .9rem;font-size:.78rem" onclick="show('v-main')">← back</button>
  </div>
  <div class="det-body" id="det-refl-body"></div>
  <div class="det-meta" id="det-refl-meta"></div>
</div>

<!-- ═══════════════════════════════════════════════
     DETAIL VIEW — feedback
════════════════════════════════════════════════ -->
<div class="view" id="v-fb-det">
  <div class="det-header">
    <div class="det-icon" id="det-fb-icon"></div>
    <div>
      <div id="det-fb-tag"></div>
      <div class="det-date" id="det-fb-date"></div>
    </div>
    <button class="btn-s" style="margin-left:auto;padding:.4rem .9rem;font-size:.78rem" onclick="show('v-main')">← back</button>
  </div>
  <div class="det-body" id="det-fb-body"></div>
  <div class="det-meta" id="det-fb-meta"></div>
</div>

<script>
// ── Showcase mode via URL param ─────────────────────────────────
// ?demo=inuse  → load filled sample data, no UI shown
// ?demo=first  → show empty/onboarding state, no UI shown
var SC_DEMO={meta:{firstRunComplete:true,createdAt:new Date(Date.now()-30*864e5).toISOString()},profile:{name:'Rosie de Vries',role:'Junior Service Designer',track:'Service Design',level:'L1 — The Learner',targetLevel:'L2 — The Practitioner',coach:'Giusivelia',pdTimeEnabled:true,pdTimeMinutes:96,calendarSanctity:{enabled:true,day:'Tuesday',time:'11:00',duration:'45 min'}},goals:[{id:'dg1',title:'Get better at facilitating stakeholder workshops',dimension:'People',linkedToFramework:true,photo:null,createdAt:new Date(Date.now()-28*864e5).toISOString(),subgoals:[{id:'ds1',title:'Shadow a senior facilitation session and take notes',done:true},{id:'ds2',title:'Read Facilitating Complex Conversations',done:true},{id:'ds3',title:'Run a low-stakes internal workshop and reflect',done:true},{id:'ds4',title:'Get peer feedback on my facilitation style',done:false},{id:'ds5',title:'Lead the next client co-design session end-to-end',done:false}]},{id:'dg2',title:'Build my systems thinking skills',dimension:'Delivery',linkedToFramework:true,photo:null,createdAt:new Date(Date.now()-20*864e5).toISOString(),subgoals:[{id:'ds6',title:'Complete Systems Thinking Fundamentals on IDEO U',done:true},{id:'ds7',title:'Map the feedback loops in a current client project',done:false},{id:'ds8',title:'Present a systems map to the team',done:false}]}],actions:[{id:'da1',title:'Shadow Guus in the city council co-design session',goalId:'dg1',done:true,doneAt:new Date(Date.now()-6*864e5).toISOString(),minutesSpent:90,energy:'energised',note:'Learned how she handles resistance in the room.'},{id:'da2',title:'Read chapter 3 of This is Service Design Doing',goalId:'dg2',done:true,doneAt:new Date(Date.now()-4*864e5).toISOString(),minutesSpent:45,energy:'neutral',note:''},{id:'da3',title:'Watch NN/g workshop facilitation videos',goalId:'dg1',done:true,doneAt:new Date(Date.now()-2*864e5).toISOString(),minutesSpent:60,energy:'energised',note:''},{id:'da4',title:'Prepare facilitation guide for Woonplus session',goalId:'dg1',done:false,createdAt:new Date().toISOString()},{id:'da5',title:'Map feedback loops in the Woonplus project',goalId:'dg2',done:false,createdAt:new Date().toISOString()}],reflections:[{id:'dr1',format:'written',date:new Date(Date.now()-5*864e5).toISOString(),energy:'energised',minutesSpent:9,content:{'wr-0':'The Woonplus discovery session.','wr-1':'Managed to keep the group on track when participants went off-tangent.','wr-3':'Structure gives me freedom — design workshops around clear transitions.','wr-4':'Ask for feedback right after the session.'}},{id:'dr2',format:'quick',date:new Date(Date.now()-3*864e5).toISOString(),energy:'neutral',minutesSpent:4,content:{'qk-0':'The blueprint review took twice as long as expected.','qk-1':'Build in more orientation time before showing a blueprint.'}},{id:'dr3',format:'walk',date:new Date(Date.now()-1*864e5).toISOString(),energy:'surprised',minutesSpent:18,content:{'wk-0':'Why I feel more confident when I have a clear agenda.','wk-1':'Structure is what gives me freedom.'}}],feedback:[{id:'df1',from:'Giusivelia',type:'positive',text:'Your synthesis slide was really clear — it told a story rather than just showing data.',date:new Date(Date.now()-7*864e5).toISOString()},{id:'df2',from:'Client (Woonplus)',type:'improve',text:'It would help to slow down when introducing the blueprint — we were slightly lost at first.',date:new Date(Date.now()-2*864e5).toISOString()}],coaching:{nextSessionDate:new Date(Date.now()+7*864e5).toISOString(),nextSessionDuration:60,myTopics:'I want to talk about how to handle a room where key stakeholders are not engaging.',commitments:[{id:'dc1',text:'Reflect on the Woonplus facilitation before next session',done:true},{id:'dc2',text:'Share the systems map draft with the team',done:false}],prepShared:false}};
(function(){
  var p = new URLSearchParams(window.location.search).get('demo');
  if (p === 'inuse') {
    PD.init('demo');
    if (PD.isFirstRun()) PD.save(SC_DEMO);
  } else if (p === 'first') {
    PD.init('demo');
    // keep empty so onboarding / empty states show
  }
  // no param = real data, default namespace
})();





// ── AI helper ─────────────────────────────────────────────────────
async function callAI(messages, system, maxTokens) {
  try {
    var body = { model:'claude-sonnet-4-20250514', max_tokens:maxTokens||1000, messages:messages };
    if (system) body.system = system;
    var resp = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    var data = await resp.json();
    if (data.content && data.content[0]) return data.content[0].text;
    return null;
  } catch(e) { return null; }
}
function parseJSON(text) {
  try { return JSON.parse(text.replace(/```json|```/g,'').trim()); }
  catch(e) { return null; }
}

// ── Navigation ─────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── AI-generated insights ──────────────────────────────────────────
function renderMain() {
  generateAIInsights();
  renderReflections();
  renderFeedbackList();
}

async function generateAIInsights() {
  var grid = document.getElementById('insight-cards');
  var refls = PD.reflections();
  var feedbs = PD.feedback();

  if (!refls.length && !feedbs.length) {
    grid.innerHTML = '<div class="insight-card empty-card" style="grid-column:span 2"><div class="ic-empty-msg">add reflections and feedback to see your insights here</div></div>';
    document.getElementById('insight-action-row').innerHTML = '';
    return;
  }

  grid.innerHTML = '<div style="grid-column:span 2;padding:.75rem 0;color:var(--muted);font-style:italic;font-size:.825rem">analysing your reflections…</div>';

  // Build data summary for Claude
  var reflTexts = refls.slice(0, 10).map(function(r) {
    var c = r.content || {};
    var texts = Object.values(c).filter(function(v) { return typeof v === 'string' && v.length > 5; });
    return { date: r.date, format: r.format, energy: r.energy, text: texts.join(' | ').slice(0, 250) };
  });
  var fbTexts = feedbs.slice(0, 8).map(function(f) {
    return { from: f.from, type: f.type, text: (f.text || '').slice(0, 180) };
  });

  var sys = 'You are an experienced professional development coach. Analyze this service designer's reflections and feedback to find genuine patterns. Be specific — reference actual things you see in the data, not generic praise. Be honest about growth areas.';
  var prompt = 'Reflections and feedback from a service designer at Essense:

REFLECTIONS: ' + JSON.stringify(reflTexts) + '

FEEDBACK: ' + JSON.stringify(fbTexts) + '

Find 2 genuine strength patterns (Good!) and 2 specific growth areas (Improve!). Respond ONLY with valid JSON (no markdown):
{"good":[{"insight":"specific strength in one sentence","source":"what it's based on"},{"insight":"...","source":"..."}],"improve":[{"insight":"specific growth area in one sentence","source":"what it's based on"},{"insight":"...","source":"..."}]}';

  var result = await callAI([{ role: 'user', content: prompt }], sys, 600);

  if (result) {
    var parsed = parseJSON(result);
    if (parsed && (parsed.good || parsed.improve)) {
      renderInsightCards(parsed.good || [], parsed.improve || []);
      var topImprove = parsed.improve && parsed.improve[0];
      renderActionRow(topImprove || null);
      return;
    }
  }

  // Fallback: use raw text from reflections/feedback
  var good = null, improve = null;
  feedbs.forEach(function(f) { if (f.text && f.type === 'positive' && !good) good = { insight: f.text.slice(0, 120), source: f.from || 'feedback' }; });
  feedbs.forEach(function(f) { if (f.text && f.type === 'improve' && !improve) improve = { insight: f.text.slice(0, 120), source: f.from || 'feedback' }; });
  refls.forEach(function(r) {
    var c = r.content || {};
    var t = c['wr-3'] || c['wk-0'] || c['qk-0'] || '';
    if (t.length > 10 && !good) good = { insight: t.slice(0, 120), source: fmtDate(r.date) + ' reflection' };
    var n = c['wr-4'] || c['wk-1'] || c['qk-1'] || '';
    if (n.length > 10 && !improve) improve = { insight: n.slice(0, 120), source: fmtDate(r.date) + ' reflection' };
  });
  renderInsightCards(good ? [good] : [], improve ? [improve] : []);
  renderActionRow(improve);
}

function renderInsightCards(goods, improves) {
  var grid = document.getElementById('insight-cards');
  var makeCard = function(item, type) {
    if (!item) return '<div class="insight-card empty-card"><div class="ic-empty-msg">not enough data yet</div></div>';
    return '<div class="insight-card ' + type + '">'
      + '<div class="ic-tag ' + type + '-tag"><div class="ic-dot ' + type + '"></div>' + (type === 'good' ? 'Good!' : 'Improve!') + '</div>'
      + '<div class="ic-text">' + esc(item.insight) + '</div>'
      + '<div class="ic-src">' + esc(item.source || '') + '</div>'
      + '</div>';
  };
  grid.innerHTML = makeCard(goods[0] || null, 'good') + makeCard(improves[0] || null, 'improve');
}

function renderActionRow(topImprove) {
  var actionRow = document.getElementById('insight-action-row');
  if (!topImprove) { actionRow.innerHTML = ''; return; }
  var igJson = JSON.stringify(topImprove).replace(/"/g, '&quot;');
  actionRow.innerHTML = '<div class="insight-action-row"><div class="ia-text">This growth area could become a goal. Want to shape it into one?</div><button class="ia-btn" onclick="openInsightGoalPanel(' + igJson + ')">shape into goal →</button></div>';
}

function openInsight() {} // placeholder

// Insight → goal panel
var igItem = null, igMode = 'subgoal';

async function openInsightGoalPanel(item) {
  igItem = item; igMode = 'subgoal';
  var goals = PD.goals();
  var panel = document.getElementById('ig-panel');
  var ta = document.getElementById('ig-text');
  ta.value = '';
  ta.placeholder = 'shaping into a goal…';

  // Use AI to transform the insight into a well-formed goal statement
  var sys = 'You are a professional development coach. Transform this insight or growth area into a clear, specific, first-person development goal. The goal should be actionable and growth-oriented. Return ONLY the goal statement (1-2 sentences, starting with a verb like "get better at", "learn to", "develop", "build confidence in"). No explanation.';
  var result = await callAI([{role:'user', content:'Insight: ' + (item.insight || item.text || '')}], sys, 150);
  ta.value = result || (item.insight || item.text || '');
  ta.placeholder = '';

  var sel = document.getElementById('ig-goal-sel');
  sel.innerHTML = '<option value="">— pick a goal to add as sub-goal —</option>';
  goals.forEach(function(g) { sel.innerHTML += '<option value="' + g.id + '">' + esc(g.title) + '</option>'; });
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function igPickMode(mode, el) {
  igMode = mode;
  document.querySelectorAll('.ig-type-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('ig-goal-sel').className = 'ig-sel' + (mode === 'newgoal' ? ' hidden' : '');
}

function igConfirm() {
  var text = document.getElementById('ig-text').value.trim();
  if (!text) { document.getElementById('ig-text').focus(); return; }
  if (igMode === 'subgoal') {
    var goalId = document.getElementById('ig-goal-sel').value;
    if (!goalId) { document.getElementById('ig-goal-sel').focus(); return; }
    PD.saveSubgoal(goalId, {title:text, done:false});
  } else {
    PD.saveGoal({title:text, subgoals:[]});
  }
  document.getElementById('ig-panel').classList.remove('open');
  document.getElementById('insight-action-row').innerHTML = '<div style="background:var(--bright);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;font-size:.825rem;color:var(--forest)">✓ ' + (igMode==='subgoal'?'added as a sub-goal':'added as a new goal') + '</div>';
}
function igCancel() { document.getElementById('ig-panel').classList.remove('open'); }

function openInsight(item, type) {
  // Just scroll to the relevant section for now
  const target = type==='good'?'refl-list':'refl-list';
  document.getElementById(target)?.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── Reflections list ────────────────────────────────────────────────
const FMT_ICONS = {written:'✍️', walk:'🚶', quick:'⚡', audio:'🎙️', talk:'🤖'};
const FMT_LABELS= {written:'Written', walk:'Walk-and-talk', quick:'Quick check-in', audio:'Audio', talk:'Guided'};
const ENERGY_ICONS = {energised:'🔋', neutral:'⚖️', drained:'🪫', surprised:'✨'};

function renderReflections() {
  const refls = PD.reflections();
  const el    = document.getElementById('refl-list');
  if(!refls.length){
    el.innerHTML=`<div class="entry-item" style="cursor:default;text-align:center;color:var(--muted);font-size:.825rem;font-style:italic">no reflections yet — start one from the reflect page</div>`; return;
  }
  el.innerHTML = refls.map(r=>`
    <div class="entry-item" onclick="openRefl('${r.id}')">
      <div class="ei-row">
        <div class="ei-icon">${FMT_ICONS[r.format]||'✍️'}</div>
        <div class="ei-body">
          <div class="ei-top">
            <span class="ei-title">${FMT_LABELS[r.format]||'Reflection'}</span>
            <span class="ei-date">${fmtDate(r.date)}</span>
            <span class="ei-tag ${r.format||'written'}">${FMT_LABELS[r.format]||'written'}</span>
          </div>
          <div class="ei-preview">${previewRefl(r.content)}</div>
        </div>
        <div class="ei-energy">${r.energy?ENERGY_ICONS[r.energy]||'':''}</div>
        <div class="ei-arr">›</div>
      </div>
    </div>`).join('');
}

function previewRefl(content) {
  if(!content) return '—';
  const text = Object.values(content).find(v=>typeof v==='string'&&v.length>5)||'';
  return text.slice(0,80)+(text.length>80?'…':'');
}

function openRefl(id) {
  const r = PD.reflections().find(r=>r.id===id); if(!r) return;
  document.getElementById('det-refl-icon').textContent = FMT_ICONS[r.format]||'✍️';
  document.getElementById('det-refl-tag').innerHTML  = `<span class="det-tag">${FMT_LABELS[r.format]||'Reflection'}</span>`;
  document.getElementById('det-refl-date').textContent = fmtDate(r.date);
  document.getElementById('det-refl-meta').innerHTML  =
    `${r.minutesSpent?'<span>'+r.minutesSpent+' min</span>':''}`+
    `${r.energy?'<span class="det-energy">'+(ENERGY_ICONS[r.energy]||'')+' '+r.energy+'</span>':''}`;

  const c=r.content||{};
  const wrLabels=['context','what went well','energy','what I learned','what\'s next'];
  const wkLabels=['on the walk','when I got back'];
  const qkLabels=['what stood out','what\'s next'];

  let html='';
  if(r.format==='written')
    html=wrLabels.map((lbl,i)=>c['wr-'+i]?`<div class="det-q">${lbl}</div><div class="det-a">${esc(c['wr-'+i])}</div>`:'').join('');
  else if(r.format==='walk')
    html=wkLabels.map((lbl,i)=>c['wk-'+i]?`<div class="det-q">${lbl}</div><div class="det-a">${esc(c['wk-'+i])}</div>`:'').join('');
  else if(r.format==='quick')
    html=qkLabels.map((lbl,i)=>c['qk-'+i]?`<div class="det-q">${lbl}</div><div class="det-a">${esc(c['qk-'+i])}</div>`:'').join('');
  else if(r.format==='audio')
    html=`<div class="det-q">recording</div><div class="det-a" style="color:var(--muted);font-style:italic">[audio — ${c.duration||0}s]</div>`+
         (c.notes?`<div class="det-q">notes</div><div class="det-a">${esc(c.notes)}</div>`:'');
  else if(r.format==='talk' && c.chat)
    html=c.chat.map((msg,i)=>`<div class="det-q">${i%2===0?'you said':'agent'}</div><div class="det-a">${esc(msg)}</div>`).join('');
  else html=`<div class="det-a" style="color:var(--muted);font-style:italic">no written content to display</div>`;

  document.getElementById('det-refl-body').innerHTML = html||'<div class="det-a" style="color:var(--muted);font-style:italic">nothing written</div>';
  show('v-refl-det');
}

// ── Feedback list ────────────────────────────────────────────────────
function renderFeedbackList() {
  const feedbs = PD.feedback();
  const el     = document.getElementById('fb-list');
  if(!feedbs.length){
    el.innerHTML=`<div class="entry-item" style="cursor:default;text-align:center;color:var(--muted);font-size:.825rem;font-style:italic">no feedback logged yet — use the button above to add some</div>`; return;
  }
  el.innerHTML = feedbs.map(f=>`
    <div class="entry-item" onclick="openFeedback('${f.id}')">
      <div class="ei-row">
        <div class="ei-icon">${f.type==='positive'?'👍':f.type==='improve'?'↑':'⚖️'}</div>
        <div class="ei-body">
          <div class="ei-top">
            <span class="ei-title">${esc(f.from||'Feedback')}</span>
            <span class="ei-date">${fmtDate(f.date)}</span>
            <span class="ei-tag ${f.type||'neutral'}">${f.type||'neutral'}</span>
          </div>
          <div class="ei-preview">${f.text?f.text.slice(0,80)+(f.text.length>80?'…':''):'—'}</div>
        </div>
        <div class="ei-arr">›</div>
      </div>
    </div>`).join('');
}

function openFeedback(id) {
  const f = PD.feedback().find(f=>f.id===id); if(!f) return;
  document.getElementById('det-fb-icon').textContent = f.type==='positive'?'👍':f.type==='improve'?'↑':'⚖️';
  document.getElementById('det-fb-tag').innerHTML  = `<span class="det-tag">${esc(f.from||'feedback')}</span>`;
  document.getElementById('det-fb-date').textContent = fmtDate(f.date);
  document.getElementById('det-fb-body').innerHTML  =
    `${f.text?`<div class="det-q">what they said</div><div class="det-a">"${esc(f.text)}"</div>`:''}
     ${f.context?`<div class="det-q">context</div><div class="det-a">${esc(f.context)}</div>`:''}`;
  document.getElementById('det-fb-meta').innerHTML  = `<span class="ei-tag ${f.type||'neutral'}">${f.type||'neutral'}</span>`;
  show('v-fb-det');
}

// ── Log feedback form ────────────────────────────────────────────────
let fbType = 'positive';
function toggleFbForm() {
  const form=document.getElementById('fb-form');
  form.classList.toggle('open');
  if(form.classList.contains('open')) form.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function pickFbType(type) {
  fbType=type;
  ['positive','improve','neutral'].forEach(t=>{
    const btn=document.getElementById('fbt-'+t);
    btn.className='fb-type-btn'+(t===type?' sel-'+t:'');
  });
}
function saveFeedback() {
  const text=document.getElementById('fb-text').value.trim();
  if(!text){ document.getElementById('fb-text').focus(); return; }
  PD.saveFeedback({
    from:    document.getElementById('fb-from').value.trim(),
    type:    fbType,
    text,
    context: document.getElementById('fb-context').value.trim(),
  });
  // Reset form
  ['fb-from','fb-text','fb-context'].forEach(id=>document.getElementById(id).value='');
  fbType='positive'; pickFbType('positive');
  const msg=document.getElementById('fb-saved'); msg.style.opacity='1'; setTimeout(()=>msg.style.opacity='0',2200);
  renderMain();
}

// ── Utilities ────────────────────────────────────────────────────────
function fmtDate(iso) {
  if(!iso) return '—';
  try{ return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
  catch(e){ return '—'; }
}
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

renderMain();
</script>

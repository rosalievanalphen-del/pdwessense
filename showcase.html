<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PD Wessense — Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="./store.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--forest:#044524;--essense:#579B7A;--bright:#EAF5F2;--egg:#FAF0DB;--yellow:#FFC502;--charcoal:#1c1c1c;--muted:#6b7280;--border:#c8dfd6;--white:#fff;--font-head:'DM Serif Display',serif;--font-body:'DM Sans',sans-serif}
html,body{height:100%;font-family:var(--font-body);background:var(--forest)}

/* ── Header bar ── */
.bar{background:var(--forest);padding:.65rem 1.25rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;z-index:10}
.bar-brand{font-family:var(--font-head);font-size:.95rem;color:var(--white);white-space:nowrap;margin-right:.5rem}
.bar-brand span{color:#b7e4c7;font-family:var(--font-body);font-size:.72rem;font-weight:400;margin-left:.4rem}

/* Mode switcher */
.mode-group{display:flex;gap:.35rem;background:rgba(255,255,255,.08);border-radius:99px;padding:.2rem}
.mode-btn{padding:.3rem .8rem;border-radius:99px;font-family:var(--font-body);font-size:.72rem;font-weight:500;cursor:pointer;border:none;color:rgba(255,255,255,.6);background:transparent;transition:all .2s;white-space:nowrap}
.mode-btn:hover{color:var(--white)}
.mode-btn.active{background:var(--white);color:var(--forest)}

/* Page nav */
.page-nav{display:flex;gap:.25rem;flex-wrap:wrap;margin-left:auto}
.nav-btn{padding:.3rem .75rem;border-radius:7px;font-family:var(--font-body);font-size:.72rem;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.65);background:transparent;transition:all .2s;white-space:nowrap}
.nav-btn:hover{border-color:rgba(255,255,255,.4);color:var(--white)}
.nav-btn.active{background:var(--white);color:var(--forest);border-color:var(--white)}

/* ── iframe ── */
.frame-wrap{width:100%;height:calc(100vh - 52px)}
iframe{width:100%;height:100%;border:none;background:var(--white)}

/* ── Loading overlay ── */
.loading{position:fixed;inset:0;top:52px;background:var(--egg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.75rem;z-index:5;transition:opacity .3s}
.loading.hidden{opacity:0;pointer-events:none}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--essense);display:inline-block;margin:0 3px;animation:bounce .8s infinite alternate}
.loading-dot:nth-child(2){animation-delay:.15s}
.loading-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.loading-label{font-size:.825rem;color:var(--muted)}
</style>
</head>
<body>

<div class="bar">
  <div class="bar-brand">🌿 PD Wessense <span>showcase</span></div>

  <div class="mode-group">
    <button class="mode-btn active" id="mode-inuse" onclick="setMode('inuse')">🌱 system in use</button>
    <button class="mode-btn" id="mode-first" onclick="setMode('first')">👋 first usage</button>
  </div>

  <div class="page-nav">
    <button class="nav-btn active" onclick="goTo('dashboard')">dashboard</button>
    <button class="nav-btn" onclick="goTo('goals')">goals</button>
    <button class="nav-btn" onclick="goTo('reflection')">reflection</button>
    <button class="nav-btn" onclick="goTo('tracker')">actions</button>
    <button class="nav-btn" onclick="goTo('insights')">insights</button>
    <button class="nav-btn" onclick="goTo('coach')">coach</button>
    <button class="nav-btn" onclick="goTo('training')">training</button>
  </div>
</div>

<div class="loading" id="loading">
  <div>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
  </div>
  <div class="loading-label" id="loading-label">loading…</div>
</div>

<div class="frame-wrap">
  <iframe id="showcase-frame" src="about:blank"></iframe>
</div>

<script>
// ── Demo data (same as dashboard demo) ───────────────────────────
var DEMO_DATA = {
  meta: { firstRunComplete:true, createdAt: new Date(Date.now()-30*864e5).toISOString() },
  profile: { name:'Rosie de Vries', role:'Junior Service Designer', track:'Service Design', level:'L1 \u2014 The Learner', targetLevel:'L2 \u2014 The Practitioner', coach:'Giusivelia', pdTimeEnabled:true, pdTimeMinutes:96, calendarSanctity:{enabled:true,day:'Tuesday',time:'11:00',duration:'45 min'} },
  goals: [
    { id:'dg1', title:'Get better at facilitating stakeholder workshops', dimension:'People', linkedToFramework:true, photo:null, createdAt: new Date(Date.now()-28*864e5).toISOString(),
      subgoals:[
        {id:'ds1',title:'Shadow a senior facilitation session and take notes',done:true},
        {id:'ds2',title:'Read Facilitating Complex Conversations (Stanford dSchool)',done:true},
        {id:'ds3',title:'Run a low-stakes internal workshop and reflect on it',done:true},
        {id:'ds4',title:'Get peer feedback from a colleague on my facilitation style',done:false},
        {id:'ds5',title:'Lead the next client co-design session end-to-end',done:false}
      ]},
    { id:'dg2', title:'Build my systems thinking skills', dimension:'Delivery', linkedToFramework:true, photo:null, createdAt: new Date(Date.now()-20*864e5).toISOString(),
      subgoals:[
        {id:'ds6',title:'Complete Systems Thinking Fundamentals on IDEO U',done:true},
        {id:'ds7',title:'Map the feedback loops in a current client project',done:false},
        {id:'ds8',title:'Present a systems map to the team and get critique',done:false}
      ]}
  ],
  actions: [
    {id:'da1',title:'Shadow Guus in the city council co-design session',goalId:'dg1',done:true,doneAt:new Date(Date.now()-6*864e5).toISOString(),minutesSpent:90,energy:'energised',note:'Learned how she handles resistance in the room.'},
    {id:'da2',title:'Read chapter 3 of This is Service Design Doing',goalId:'dg2',done:true,doneAt:new Date(Date.now()-4*864e5).toISOString(),minutesSpent:45,energy:'neutral',note:''},
    {id:'da3',title:'Watch the NN/g workshop facilitation video series',goalId:'dg1',done:true,doneAt:new Date(Date.now()-2*864e5).toISOString(),minutesSpent:60,energy:'energised',note:''},
    {id:'da4',title:'Prepare facilitation guide for Woonplus session',goalId:'dg1',done:false,createdAt:new Date().toISOString()},
    {id:'da5',title:'Map feedback loops in the Woonplus project',goalId:'dg2',done:false,createdAt:new Date().toISOString()}
  ],
  reflections: [
    {id:'dr1',format:'written',date:new Date(Date.now()-5*864e5).toISOString(),energy:'energised',minutesSpent:9,content:{'wr-0':'The Woonplus discovery session.','wr-1':'I managed to keep the group on track even when two participants went off on a tangent.','wr-3':'Structure gives me freedom — I need to design workshops around clear moments of transition.','wr-4':'Ask for feedback right after the session, not a week later.'}},
    {id:'dr2',format:'quick',date:new Date(Date.now()-3*864e5).toISOString(),energy:'neutral',minutesSpent:4,content:{'qk-0':'The blueprint review took twice as long as expected.','qk-1':'Build in more orientation time before showing a blueprint.'}},
    {id:'dr3',format:'walk',date:new Date(Date.now()-1*864e5).toISOString(),energy:'surprised',minutesSpent:18,content:{'wk-0':'I kept thinking about why I feel more confident when I have a clear agenda.','wk-1':'Structure is what gives me freedom — I should design my workshops around clear moments of transition.'}}
  ],
  feedback: [
    {id:'df1',from:'Giusivelia',type:'positive',text:'Your synthesis slide was really clear \u2014 it told a story rather than just showing data.',date:new Date(Date.now()-7*864e5).toISOString()},
    {id:'df2',from:'Client (Woonplus)',type:'improve',text:'It would help to slow down a bit when introducing the blueprint \u2014 we were slightly lost at first.',date:new Date(Date.now()-2*864e5).toISOString()}
  ],
  coaching: { nextSessionDate:new Date(Date.now()+7*864e5).toISOString(), nextSessionDuration:60, myTopics:'I want to talk about how to handle a room where key stakeholders are not engaging.', commitments:[{id:'dc1',text:'Reflect on the Woonplus facilitation before next session',done:true},{id:'dc2',text:'Share the systems map draft with the team',done:false}], prepShared:false }
};

// ── State ────────────────────────────────────────────────────────
var currentMode = 'inuse';
var currentPage = 'dashboard';

// ── Init ─────────────────────────────────────────────────────────
function init() {
  // Write demo data to 'essense-pd-demo' namespace via PD store
  PD.init('demo');
  PD.save(DEMO_DATA);
  // Load first page
  goTo('dashboard');
}

// ── Mode switch ───────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  // Update button states
  document.getElementById('mode-inuse').classList.toggle('active', mode === 'inuse');
  document.getElementById('mode-first').classList.toggle('active', mode === 'first');
  // For 'first': reset demo data so onboarding shows
  if (mode === 'first') {
    PD.init('demo');
    PD.reset();
  } else {
    PD.init('demo');
    PD.save(DEMO_DATA);
  }
  // Reload current page in new mode
  goTo(currentPage);
}

// ── Navigation ────────────────────────────────────────────────────
function goTo(page) {
  currentPage = page;
  // Update nav buttons
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  var labels = {dashboard:'dashboard',goals:'goals',reflection:'reflection',tracker:'actions',insights:'insights',coach:'coach',training:'training'};
  document.querySelectorAll('.nav-btn').forEach(function(b) {
    if (b.textContent.trim() === (labels[page] || page)) b.classList.add('active');
  });
  // Show loading
  showLoading(page);
  // Load iframe
  var frame = document.getElementById('showcase-frame');
  var url = page + '.html?demo=' + currentMode;
  frame.src = url;
}

function showLoading(page) {
  var el = document.getElementById('loading');
  var label = document.getElementById('loading-label');
  var names = {dashboard:'dashboard',goals:'goals',reflection:'reflection',tracker:'actions',insights:'insights',coach:'coach prep',training:'training'};
  label.textContent = 'loading ' + (names[page] || page) + '\u2026';
  el.classList.remove('hidden');
}

document.getElementById('showcase-frame').addEventListener('load', function() {
  document.getElementById('loading').classList.add('hidden');
});

// Boot
init();
</script>
</body>
</html>
